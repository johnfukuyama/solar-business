<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .project-item {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s;
    }
    .project-item:hover {
      transform: scale(1.03);
    }
    .project-item img {
      width: 100%;
      height: auto;
      display: block;
    }
    .project-item p {
      margin: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Projects</h1>

  <div class="projects-grid">
    <!-- Add your projects here -->
    <div class="project-item">
      <img src="images/project1.jpg" alt="">
      <p>Project 1</p>
    </div>
    <div class="project-item">
      <img src="images/project2.jpg" alt="">
      <p>Project 2</p>
    </div>
    <div class="project-item">
      <img src="images/project3.jpg" alt="">
      <p>Project 3</p>
    </div>
    <!-- Duplicate the above div for more projects -->
  </div>

</body>
</html>
